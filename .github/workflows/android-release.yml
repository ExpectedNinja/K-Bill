name: Build and Release Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies and build Web
        run: |
          npm install
          npm run build

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Recreate Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare APK Asset
        run: |
          cd android/app/build/outputs/apk/release/
          # Rename the default app-release.apk to match our release tag!
          mv app-release.apk v1.0.${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: K-Bill v1.0.${{ github.run_number }}
          body: |
            # 🚀 Changelog in v1.0.${{ github.run_number }}
            
            General text
            
            ## 🐛 Bug Fixes
            - Addressed minor stability issues
            
            ## ✨ Features
            - Native Android APK Generation
            - Local data storage and UI mappings
            
            ## 📈 Improvements
            - Enhanced performance and styling
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/v1.0.${{ github.run_number }}.apk
